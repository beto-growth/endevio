name: Sync Listings from ReapCRM XML

on:
  # 12:00 AM Malta (UTC+2 summer / UTC+1 winter)
  # Summer (CEST): 22:00 UTC | Winter (CET): 23:00 UTC
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 10 * * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    name: Sync HubSpot Listings
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Run sync
        working-directory: scripts
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: node sync-listings.js
